services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpd_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storageÍ
    depends_on:
      - meilisearch

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: rpd_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./storage:/var/www/html/storage:ro
    depends_on:
      - app

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: rpd_meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
    volumes:
      - meili_data:/meili_data
    ports:
      - "127.0.0.1:7700:7700"

volumes:
  meili_data: